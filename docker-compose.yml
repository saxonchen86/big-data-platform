version: '3.8'

services:
  # --- [开发容器] ---
  dev-runner:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    container_name: dev-box
    restart: always
    environment:
      - JAVA_HOME=/opt/jdk
      - PATH=/opt/venv/bin:/opt/jdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/workspace:cached
      - ~/.ssh:/root/.ssh:ro
      - ./libs/jdk:/opt/jdk
      - streampark_maven_repo:/root/.m2
    # 使用多行字符串语法（>）让结构更清晰
    # 分别启动两个脚本并将其日志输出到对应的文件夹下，最后保持容器运行
    command: >
      bash -c "
      python3 /workspace/dataflow/eth_info_dataflow/rss_to_eth_social_stream.py > /dev/null 2>&1 & &
      python3 /workspace/dataflow/eth_trade_dataflow/market_data_collector.py >> /workspace/dataflow/eth_trade_dataflow/market_task.log 2>&1 &
      python3 /workspace/dataflow/eth_trade_dataflow/eth_trade_settlement.py >> /workspace/dataflow/eth_trade_dataflow/settlement.log 2>&1 &
      sleep infinity"
    networks:
      - big-data-network
  # --- 1. Apache Kafka (KRaft模式) ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: always  # <-- 新增：随宿主机启动
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - big-data-network
    environment:
      PATH: "/opt/kafka/bin:${PATH}"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: "MKU3OEVBNTcwNTJDRkFDMz"
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_FLUSH_INTERVAL_MS: 10000
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
      TZ: Asia/Shanghai  # <-- 新增：上海时间
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 2048M
    volumes:
      - ./data/kafka:/var/lib/kafka/data

  # --- 3. Flink JobManager ---
  flink-jobmanager:
    user: root
    image: flink:1.18
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    networks:
      - big-data-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./libs/jdk:/opt/jdk
      - ./data/streampark_workspace:/streampark/workspace
      - ./flink-1.18.1/lib:/opt/flink/lib
      - ./flink-data/checkpoints:/opt/flink/checkpoints
      - ./flink-data/savepoints:/opt/flink/savepoints
      - ./flink-data/usrlib:/opt/flink/usrlib
      - ./data/flink_checkpoints:/flink_checkpoints
      - ./data/flink_uploads:/opt/flink/usr
    environment:
      - JAVA_HOME=/opt/jdk
      - PATH=/opt/jdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        rest.bind-port: 8081
        parallelism.default: 1
        execution.checkpointing.interval: 10000
        execution.checkpointing.mode: EXACTLY_ONCE
        state.backend: hashmap
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
    deploy:
      resources:
        limits:
          memory: 1536M

  # --- 4. Flink TaskManager ---
  flink-taskmanager:
    user: root
    image: flink:1.18
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    networks:
      - big-data-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./libs/jdk:/opt/jdk
      - ./data/streampark_workspace:/streampark/workspace
      - ./flink-1.18.1/lib:/opt/flink/lib
      - ./flink-data/checkpoints:/opt/flink/checkpoints
      - ./flink-data/savepoints:/opt/flink/savepoints
      - ./flink-data/usrlib:/opt/flink/usrlib
    environment:
      - JAVA_HOME=/opt/jdk
      - PATH=/opt/jdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 3072m
    deploy:
      resources:
        limits:
          memory: 4096M

  # --- 5. MySQL ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    platform: linux/arm64
    networks:
      - big-data-network
    environment:
      MYSQL_ROOT_PASSWORD: streampark
      MYSQL_DATABASE: streampark
      TZ: Asia/Shanghai  # <-- 新增：上海时间
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 1024M

  # --- 6. StreamPark ---
  streampark:
    user: root
    image: apache/streampark:2.1.6
    platform: linux/arm64
    container_name: streampark
    ports:
      - "10000:10000"
    env_file: .env
    networks:
      - big-data-network
    environment:
      - FLINK_HOME=/opt/flink
      - JAVA_HOME=/opt/jdk
      - PATH=/opt/jdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - STREAM_PARK_WORKSPACE=/streampark/workspace
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
    depends_on:
      - flink-jobmanager
      - kafka
    volumes:
      - ./libs/jdk:/opt/jdk
      - ./data/streampark_h2:/root/streampark/h2-data
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube
      - ./flink-1.18.1:/opt/flink
      - ./flink-data/usrlib:/opt/flink/usrlib
      - ./data/streampark_workspace:/streampark/workspace
      - streampark_maven_repo:/root/.m2
      - ./data/flink_checkpoints:/flink_checkpoints
    command: tail -f /dev/null

  # --- 7. AI 基础设施 (Milvus) ---
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.10
    networks:
      - big-data-network
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    networks:
      - big-data-network
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      TZ: Asia/Shanghai  # <-- 新增：上海时间
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.15
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    networks:
      - big-data-network
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      COMMON_STORAGETYPE: minio
      TZ: Asia/Shanghai  # <-- 原本已有，保持不变
    volumes:
      - ./data/milvus:/var/lib/milvus
      - ./data/logs/milvus:/milvus/logs
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

  attu:
    container_name: milvus-attu
    image: zilliz/attu:latest
    networks:
      - big-data-network
    environment:
      MILVUS_URL: milvus-standalone:19530
      TZ: Asia/Shanghai  # <-- 新增：上海时间
    ports:
      - "8000:3000"
    depends_on:
      - milvus

  # --- 可视化监测 ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: monitoring-cadvisor
    privileged: true
    networks:
      - big-data-network
    environment:
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    networks:
      - big-data-network
    environment:
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor

  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    networks:
      - big-data-network
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - TZ=Asia/Shanghai  # <-- 新增：上海时间
    depends_on:
      - prometheus

volumes:
  kafka_data:
  mysql_data:
  streampark_maven_repo:

networks:
  big-data-network:
    external: true